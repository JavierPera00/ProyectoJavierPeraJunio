spring.application.name=ProyectoJunio

# Hemos añadido localSocketAddress y disabledAuthenticationPlugins a la URL
spring.datasource.url=jdbc:mariadb://localhost:3306/jpa?createDatabaseIfNotExist=true&disabledAuthenticationPlugins=org.mariadb.jdbc.plugin.authentication.addon.gssapi.StandardGssapiAuthentication
spring.datasource.username=root

# ASEGÚRATE DE QUE ESTA CONTRASEÑA SEA LA QUE TE DEJA ENTRAR EN HEIDISQL
spring.datasource.password=root

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
server.port=8080