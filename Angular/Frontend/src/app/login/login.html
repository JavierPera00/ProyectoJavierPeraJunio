<section id="login">
  <div class="container vh-100 d-flex justify-content-center align-items-center login-body">
    <div class="card shadow p-4 login-card">
      <form class="text-center" (ngSubmit)="iniciarSesion($event)">
        <img class="mb-4" src="/logo.png" alt="Logo" width="72" height="57" />
        <h2 class="titulo-login">Login</h2>

        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="floatingInput"
            [(ngModel)]="datosLogin.username"
            name="username"
            required
          />
          <label for="floatingInput">Escribe el Usuario</label>
        </div>

        <div class="form-floating mb-3">
          <input
            type="password"
            class="form-control"
            id="floatingPassword"
            placeholder="Password"
            [(ngModel)]="datosLogin.password"
            name="password"
            required
          />
          <label for="floatingPassword">Escribe la Contraseña</label>
        </div>

        <div class="form-check text-start mb-3">
          <input class="form-check-input" type="checkbox" id="checkDefault" />
          <label class="form-check-label" for="checkDefault"> Recordarme </label>
        </div>

        <button class="btn btn-primary w-100 py-2 mb-3">Iniciar sesión</button>

        <p class="text-danger mt-2">{{ mensaje }}</p>

        <hr class="my-4" />
        <p class="mb-2 text-muted">¿No tienes una cuenta?</p>
        <a [routerLink]="['/registro']" class="btn btn-outline-secondary w-100"> Crear cuenta </a>
        <p class="mt-4 mb-0 text-muted">© 2025–2026</p>
      </form>
    </div>
  </div>
</section>
