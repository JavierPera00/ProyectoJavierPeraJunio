<section id="mapa">
    <main class="mapa-main py-5 mapa-body">
        <div class="ratio ratio-16x9 mb-4">
            <iframe
                src="https://cybermap.kaspersky.com/es"
                class="cybermap-iframe"
                title="Mapa de ciberataques de Kaspersky"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
        <div class="iframe-container mb-4">
            <iframe
                src="https://threatmap.bitdefender.com/"
                class="bitmap-iframe"
                title="Mapa de ciberataques Bitdefender"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
      <button [routerLink]="['/home']" class="btn btn-warning">Volver</button>
    </main>
</section>
