<div class="register-body d-flex flex-column justify-content-center align-items-center">
  <div class="register-card p-4 shadow rounded-3 bg-white">
    <h2 class="text-center mb-4">Crear Cuenta</h2>

    <form (submit)="registrar($event)">

      <!-- Usuario -->
      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <input type="text" id="username" class="form-control"
               [(ngModel)]="datosUsuario.username" name="username"
               placeholder="Tu nombre de usuario" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Correo Electrónico</label>
        <input type="email" id="email" class="form-control"
               [(ngModel)]="datosUsuario.email" name="email"
               placeholder="ejemplo@correo.com" required>
      </div>

      <!-- Contraseña -->
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control"
               [(ngModel)]="datosUsuario.password" name="password"
               placeholder="Contraseña segura" required>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" class="form-control"
               [(ngModel)]="datosUsuario.confirmPassword" name="confirmPassword"
               placeholder="Repite la contraseña" required>
      </div>

      <!-- Botón -->
      <div class="d-grid">
        <button type="submit" class="btn btn-warning">Crear Cuenta</button>
      </div>

      <!-- Mensaje -->
      <p class="text-center mt-3 text-danger">{{ mensaje }}</p>

      <!-- Link a login -->
      <p class="text-center mt-2">
        ¿Ya tienes cuenta? 
        <a [routerLink]="['/login']">Inicia sesión</a>
      </p>
    </form>
  </div>
</div>
