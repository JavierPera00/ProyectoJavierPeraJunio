
<div class="perfil-body container py-4">
  <div class="card p-3 shadow mb-4">
    <div class="mb-3 d-flex justify-content-center">
     <img class="mb-4" src="/logo.png" alt="Logo" width="120px" height="80px">
    </div>

    <div class="mb-3">
      <label>Editar Usuario</label>
      <input type="text" class="form-control" [(ngModel)]="usuario.username" name="username">
    </div>

    <div class="mb-3">
      <label>Editar Email</label>
      <input type="email" class="form-control" [(ngModel)]="usuario.email" name="email">
    </div>

    <div class="mb-3">
      <label>Nueva Contraseña</label>
      <input type="password" class="form-control" [(ngModel)]="usuario.password" name="password">
    </div>

    <div class="mb-3 d-flex justify-content-between">
        <button [routerLink]="['/home']" class="btn btn-warning" (click)="guardarCambios()">Guardar</button>
        <button  class="btn btn-warning"(click)="cerrarSesion()" >Cerrar Sesión</button>
    </div>
    <p class="mt-2 text-success">{{ mensaje }}</p>
  </div>
</div>
