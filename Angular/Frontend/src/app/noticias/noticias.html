<div class="noticias-page">
  <div class="noticias-header">
    <span class="page-tag">// feed en vivo</span>
    <h1 class="page-title">Últimas <span>Noticias</span></h1>
  </div>

  <div class="noticias-grid">
    <ng-container *ngIf="noticias | async as listaNoticias; else cargando">
      <div
        class="noticia-card"
        *ngFor="let noticia of listaNoticias; let i = index"
        [class.noticia-featured]="i === 0"
      >
        <div class="noticia-img-wrap">
          <img [src]="noticia.urlImagen" [alt]="noticia.titulo" class="noticia-img" />
          <span class="noticia-badge" *ngIf="i === 0">BREAKING</span>
        </div>

        <div class="noticia-body">
          <h5 class="noticia-title" [class.title-featured]="i === 0">
            {{ noticia.titulo }}
          </h5>

          <p class="noticia-desc">{{ noticia.descripcion }}</p>

          <a
            [href]="noticia.urlExterna"
            target="_blank"
            class="noticia-btn"
            [class.btn-featured]="i === 0"
          >
            Leer más →
          </a>
        </div>

        <div class="noticia-footer">
          {{ noticia.fechaPublicacion | date: 'dd MMMM yyyy' }}
        </div>
      </div>
    </ng-container>

    <ng-template #cargando>
      <div class="noticias-loading">
        <div class="loading-dot"></div>
        <span>Cargando noticias...</span>
      </div>
    </ng-template>
  </div>
</div>
