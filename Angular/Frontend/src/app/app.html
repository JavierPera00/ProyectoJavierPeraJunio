<div class="d-flex flex-column min-vh-100">
  <!-- CONTENEDOR PRINCIPAL -->
  <div class="d-flex flex-grow-1">
    <!-- SIDEBAR -->
    <div class="flex-shrink-0 bg-dark text-warning d-flex flex-column p-3" style="width: 260px">
      <!-- Logo -->
      <div class="text-center mb-3">
        <a [routerLink]="['/home']">
          <img src="/logo.png" width="160" />
        </a>
      </div>

      <!-- Navegación -->
      <nav class="nav flex-column mb-3">
        <a [routerLink]="['/home']" class="nav-link text-warning">Home</a>
        <a [routerLink]="['/noticias']" class="nav-link text-warning">Noticias</a>
        <a [routerLink]="['/cursos']" class="nav-link text-warning">Cursos</a>
        <a [routerLink]="['/comentarios']" class="nav-link text-warning">Comentarios</a>
      </nav>

      <!-- CALENDARIO -->
      <div class="bg-black rounded p-3 mt-3 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-bold text-warning">Febrero</span>
          <span class="small text-white-50">2026</span>
        </div>

        <!-- Días semana -->
        <div class="calendar-header text-white-50 small text-center mb-2">
          <div>L</div>
          <div>M</div>
          <div>X</div>
          <div>J</div>
          <div>V</div>
          <div>S</div>
          <div>D</div>
        </div>

        <!-- Días -->
        <div class="calendar-body text-center small">
          <!-- espacios -->
          <div></div>
          <div></div>

          <!-- días -->
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>

          <div>6</div>
          <div>7</div>
          <div>8</div>
          <div>9</div>
          <div>10</div>
          <div>11</div>
          <div>12</div>

          <div>13</div>
          <div>14</div>
          <div class="today">15</div>
          <div>16</div>
          <div>17</div>
          <div>18</div>
          <div>19</div>

          <div>20</div>
          <div>21</div>
          <div>22</div>
          <div>23</div>
          <div>24</div>
          <div>25</div>
          <div>26</div>

          <div>27</div>
          <div>28</div>
        </div>
      </div>

      <div class="bg-black border border-warning rounded p-3 mt-4 small">
        <h6 class="text-warning mb-2"><i class="bi bi-shield-lock"></i> Tip de seguridad</h6>

        <div class="text-white-50 fst-italic">
          “Nunca reutilices contraseñas. Usa un gestor seguro.”
        </div>
      </div>

      <div class="flex-grow-1"></div>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 d-flex flex-column">
      <!-- NAVBAR -->
      <nav class="navbar navbar-dark bg-dark px-3">
        <div class="container-fluid">
          <div class="ms-auto">
            <div class="dropdown">
              <a
                href="#"
                class="d-flex align-items-center text-warning text-decoration-none dropdown-toggle"
                data-bs-toggle="dropdown"
              >
                <img src="OIP (1).webp" width="32" height="32" class="rounded-circle me-2" />
                <strong>{{ usuarioNombre }}</strong>
              </a>

              <ul class="dropdown-menu dropdown-menu-dark shadow">
                <li><a class="dropdown-item" [routerLink]="['/login']">Iniciar sesión</a></li>
                <li><a class="dropdown-item" [routerLink]="['/perfil']">Perfil</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" (click)="cerrarSesion()">Cerrar sesión</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>

      <!-- ROUTER -->
      <div class="flex-grow-1 overflow-auto p-4">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white py-4 mt-auto">
    <div class="container">
      <div class="d-flex justify-content-between small">
        <span class="text-white-50">© 2026 CyberNews</span>

        <div>
          <i class="bi bi-instagram text-white-50 me-2"></i>
          <i class="bi bi-facebook text-white-50 me-2"></i>
          <i class="bi bi-twitter text-white-50 me-2"></i>
          <i class="bi bi-linkedin text-white-50 me-2"></i>
          <i class="bi bi-youtube text-white-50 me-2"></i>
          <i class="bi bi-tiktok text-white-50"></i>
        </div>
      </div>
    </div>
  </footer>
</div>
